server.port=9090
spring.application.name=problem-service

spring.datasource.url=jdbc:mysql://localhost:3306/serviceeverz?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Service URLs (direct \u2014 no Eureka)
mail.service.url=http://localhost:8094
user.service.url=http://localhost:8083
# FIXED: incident/ticket service is at 8086 (not 8081)
incident.service.url=http://localhost:8088

notification.manager.user-id=1

feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000
 

# FIXED: Eureka disabled \u2014 all services use direct Feign URLs
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

logging.level.com.rvz.problemservice=DEBUG
