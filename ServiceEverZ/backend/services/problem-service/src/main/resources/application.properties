# Application
server.port=0
spring.application.name=problem-service
 
# Database
spring.datasource.url=jdbc:mysql://localhost:3306/serviceeverz?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
 
# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
 
# External Services
mail.service.url=http://localhost:8080
user.service.url=http://localhost:8080
incident.service.url=http://localhost:8080
 
# Notification Configuration
notification.manager.user-id=1
 
# Feign Client
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000
 
# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000
 
# File Attachment Configuration
problem.attachment.upload-dir=uploads/problem-attachments
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
 
# Logging
logging.level.com.rvz.problemservice=DEBUG
logging.level.org.springframework.cloud.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO
