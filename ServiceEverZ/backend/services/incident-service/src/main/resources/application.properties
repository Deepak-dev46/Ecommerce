spring.application.name=incident-service
server.port=0

spring.datasource.url=jdbc:mysql://mysql:3306/serviceeverz?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Service URLs \u2014 must match the ports of the other running microservices
master.service.url=http://api-gateway:8080
mail.service.base-url=http://api-gateway:8080/api/mail

logging.level.com.rvz.incidentservice=INFO

eureka.client.service-url.defaultZone=http://eureka-service:8761/eureka/
eureka.instance.prefer-ip-address=true