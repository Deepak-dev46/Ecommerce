spring.application.name=approval-service
server.port=8091
spring.datasource.url=jdbc:mysql://localhost:3306/serviceeverz?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
ticket.service.url=http://localhost:8080
email.service.url=http://localhost:8094/api/mail/send
assignment.service.url=http://localhost:8084/api/assignments/trigger
sla.service.url=http://localhost:8086/api/sla/start
master.service.url=http://localhost:8081
logging.level.com.rvz.approvalservice=INFO

# Feign client base URLs
email.service.base-url=http://localhost:8094/api/mail
assignment.service.base-url=http://localhost:8084/api/assignments
sla.service.base-url=http://localhost:8086/api/sla
