spring.application.name=approval-service
server.port=0
spring.datasource.url=jdbc:mysql://mysql:3306/serviceeverz?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
ticket.service.url=http://api-gateway:8080
email.service.url=http://api-gateway:8080/api/mail/send
assignment.service.url=http://api-gateway:8080/api/assignments/trigger
sla.service.url=http://api-gateway:8080/api/sla/start
master.service.url=http://api-gateway:8080
logging.level.com.rvz.approvalservice=INFO

# Feign client base URLs
email.service.base-url=http://api-gateway:8080/api/mail
assignment.service.base-url=http://api-gateway:8080/api/assignments
sla.service.base-url=http://api-gateway:8080/api/sla


eureka.client.service-url.defaultZone=http://eureka-service:8761/eureka/
eureka.instance.prefer-ip-address=true