spring.application.name=action-service
server.port=0
spring.datasource.url=jdbc:mysql://mysql:3306/serviceeverz?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Downstream service URLs
ticket.service.url=http://api-gateway:8080/api/tickets
sla.service.url=http://api-gateway:8080/api/sla
master.service.url=http://api-gateway:8080

# ITSM Manager user ID \u2014 resolved to real email via master-data-service
# Set this to the actual user ID of the ITSM manager in the users table
itsm.manager.user.id=2

# Feign client base URLs
email.service.base-url=http://api-gateway:8080/api/mail

logging.level.com.rvz.actionservice=INFO


eureka.client.service-url.defaultZone=http://eureka-service:8761/eureka/
eureka.instance.prefer-ip-address=true