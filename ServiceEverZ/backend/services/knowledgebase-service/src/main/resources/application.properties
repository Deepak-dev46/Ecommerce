server.port=0
spring.application.name=knowledge-base-service

spring.datasource.url=jdbc:mysql://localhost:3306/serviceeverz?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.client.register-with-eureka=true

eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true

 

# Feign circuit breaker
spring.cloud.openfeign.circuitbreaker.enabled=true

# FIXED: user-service URL \u2014 both config styles set to 8083
spring.cloud.openfeign.client.config.user-management-service.url=http://localhost:8080
feign.client.url.user-management-service=http://localhost:8080
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.level.com.rvz.serviceeverz=DEBUG
logging.level.org.springframework.web=INFO

spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=510MB
