spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

email.imap.host=imap.example.com
email.imap.port=993
email.imap.username=test@example.com
email.imap.password=testpass
email.imap.folder=INBOX
email.imap.poll-interval-ms=60000

master.service.url=http://localhost:8081
ticket.service.url=http://localhost:8082
mail.service.url=http://localhost:8085

spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=test@example.com
spring.mail.password=testpass
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
