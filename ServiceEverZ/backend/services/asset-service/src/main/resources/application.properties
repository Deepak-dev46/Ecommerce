server.port=0
spring.application.name=asset-service
spring.datasource.url=jdbc:mysql://localhost:3306/serviceeverz?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.username=root
spring.datasource.password=admin@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.client.register-with-eureka=true

eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true

 
 
# Mail Service
mail.service.url=http://localhost:8080
 
# UMS Service
ums.service.url=http://localhost:8080

# Ticket Service
ticket.service.url=http://localhost:8080
 
# Manager userId for rental expiry alerts (from UMS DB)
notification.manager.user-id=1
 
logging.level.com.rvz.serviceeverz=DEBUG
