server.port=8085
spring.application.name=asset-service
spring.datasource.url=jdbc:mysql://localhost:3306/serviceeverz_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
 
# Mail Service
mail.service.url=http://localhost:8082
 
# UMS Service
ums.service.url=http://localhost:8083

# Ticket Service
ticket.service.base-url=http://localhost:8086/mock/tickets
 
# Manager userId for rental expiry alerts (from UMS DB)
notification.manager.user-id=1
 
logging.level.com.rvz.serviceeverz=DEBUG