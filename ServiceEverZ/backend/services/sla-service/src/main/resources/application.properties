spring.application.name=sla-service
server.port=0
spring.datasource.url=jdbc:mysql://localhost:3306/serviceeverz?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
email.service.url=http://localhost:8080/api/mail/send
ticket.service.url=http://localhost:8080/api/tickets
itsm.manager.email=itsm.manager@itsm.com
logging.level.com.rvz.slaservice=INFO
# Feign client base URLs
email.service.base-url=http://localhost:8080/api/mail
