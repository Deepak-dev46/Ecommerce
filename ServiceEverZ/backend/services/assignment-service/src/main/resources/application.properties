# assignment-service/src/main/resources/application.properties
spring.application.name=assignment-service
server.port=0
spring.datasource.url=jdbc:mysql://localhost:3306/serviceeverz?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# External service URLs
email.service.url=http://localhost:8080/api/mail/send
ticket.service.url=http://localhost:8080/api/tickets
master.service.url=http://localhost:8080

# ITSM Manager user ID \u2014 set to the user ID of the manager in the users table
# This is used to fetch their real email from master-service (no @itsm.com mocks)
itsm.manager.user.id=2

# Acknowledgement timeout in minutes
ack.timeout.minutes=30

logging.level.com.rvz.assignmentservice=INFO

# Feign client base URLs
email.service.base-url=http://localhost:8080/api/mail

eureka.instance.prefer-ip-address=true
