server:
  port: 0

spring:
  application:
    name: ticket-service

  datasource:
    url: jdbc:mysql://localhost:3306/serviceeverz?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Mail config (Team A) — used by Team A's direct mail features
  mail:
    host: smtp.gmail.com
    port: 587
    username: relevantz.servicedesk@gmail.com
    password: hvcyefchhtpnqwbx
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

sla:
  hours:
    LOW: 72
    MEDIUM: 24
    HIGH: 8
    CRITICAL: 4

# ── URLs to Team C's services (Feign fallback URLs if Eureka is down) ──
their.user.service.url: http://localhost:8080
master.service.url: http://localhost:8080
approval.service.base-url: http://localhost:8080/api/approvals
mail.service.base-url: http://localhost:8080/api/mail
service.catalog.base-url: http://localhost:8080
rmo.service.url: http://localhost:8080


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    com.relevantz.ticketservice: INFO
