services:
 
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: serviceeverz
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - serviceeverz-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
 
  eureka-service:
    build:
      context: ./services/eureka-service
    container_name: eureka-service
    ports:
      - "8761:8761"
    networks:
      - serviceeverz-network
 
  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-service:
        condition: service_started
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - serviceeverz-network
 
  auth-service:
    build:
      context: ./services/auth-service
    container_name: auth-service
    environment:
      DB_PASSWORD: root123
    depends_on:
      mysql:
        condition: service_healthy
      eureka-service:
        condition: service_started
    networks:
      - serviceeverz-network
 
  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    environment:
      DB_PASSWORD: root123
